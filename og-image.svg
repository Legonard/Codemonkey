<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="codemonkey — a typing test for code">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: 'Lexend Deca', system-ui, -apple-system, 'Segoe UI', sans-serif; }
    </style>
    <radialGradient id="glow" cx="78%" cy="14%" r="62%">
      <stop offset="0%" stop-color="#e2b714" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#e2b714" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="#323437"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#e2b714"/>

  <!-- ===== left column ===== -->
  <!-- monkey mark -->
  <g transform="translate(84,86) scale(1.7)">
    <circle cx="11" cy="28" r="9" fill="#e2b714"/>
    <circle cx="53" cy="28" r="9" fill="#e2b714"/>
    <circle cx="9" cy="27" r="3.4" fill="#323437"/>
    <circle cx="55" cy="27" r="3.4" fill="#323437"/>
    <circle cx="32" cy="33" r="18" fill="#e2b714"/>
    <ellipse cx="32" cy="39" rx="12.5" ry="9" fill="#000000" fill-opacity="0.13"/>
    <circle cx="25" cy="30" r="2.7" fill="#323437"/>
    <circle cx="39" cy="30" r="2.7" fill="#323437"/>
    <circle cx="29.5" cy="39" r="1.5" fill="#323437"/>
    <circle cx="34.5" cy="39" r="1.5" fill="#323437"/>
    <path d="M27 43.5 Q32 47.5 37 43.5" fill="none" stroke="#323437" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="86" y="330" class="mono" font-size="98" font-weight="700" letter-spacing="-3">
    <tspan fill="#e2b714">code</tspan><tspan fill="#d1d0c5">monkey</tspan>
  </text>
  <text x="90" y="384" class="sans" font-size="34" fill="#9a9c9f" font-weight="300">a typing speed test for&#160;<tspan fill="#d1d0c5">code</tspan></text>

  <!-- stat chips -->
  <g class="mono" font-size="22">
    <rect x="90"  y="430" width="118" height="46" rx="23" fill="#2c2e31"/>
    <text x="149" y="459" text-anchor="middle" fill="#646669">wpm</text>
    <rect x="220" y="430" width="170" height="46" rx="23" fill="#2c2e31"/>
    <text x="305" y="459" text-anchor="middle" fill="#646669">accuracy</text>
    <rect x="402" y="430" width="196" height="46" rx="23" fill="#2c2e31"/>
    <text x="500" y="459" text-anchor="middle" fill="#646669">consistency</text>
  </g>

  <text x="90" y="556" class="mono" font-size="24" fill="#e2b714">fizzexual.github.io/Codemonkey</text>

  <!-- ===== right column: editor window ===== -->
  <g filter="url(#shadow)">
    <rect x="648" y="118" width="476" height="394" rx="20" fill="#2b2d30"/>
  </g>
  <rect x="648" y="118" width="476" height="394" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <!-- title bar -->
  <circle cx="684" cy="152" r="7" fill="#ca4754"/>
  <circle cx="708" cy="152" r="7" fill="#e2b714"/>
  <circle cx="732" cy="152" r="7" fill="#88c0d0"/>
  <text x="1100" y="158" text-anchor="end" class="mono" font-size="19" fill="#5b5d60">fib.js</text>
  <line x1="648" y1="184" x2="1124" y2="184" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- code (typed = bright, caret = accent, untyped = dim) -->
  <g class="mono" font-size="29">
    <text x="684" y="244"><tspan fill="#e2b714">function</tspan><tspan fill="#d1d0c5"> fib(n) {</tspan></text>
    <text x="684" y="292" fill="#d1d0c5">  if (n &lt; 2) return n;</text>
    <text x="684" y="340"><tspan fill="#d1d0c5">  return fib(n - 1) + fib(n</tspan></text>
    <rect x="1043" y="318" width="3.5" height="30" rx="1.75" fill="#e2b714"/>
    <text x="1049" y="340" fill="#565a5e"> - 2);</text>
    <text x="684" y="388" fill="#565a5e">}</text>
  </g>

  <!-- mini live-stat under the code -->
  <text x="684" y="466" class="mono" font-size="22"><tspan fill="#e2b714">128</tspan><tspan fill="#646669"> wpm</tspan><tspan fill="#646669">      </tspan><tspan fill="#d1d0c5">99%</tspan><tspan fill="#646669"> acc</tspan></text>
</svg>
